<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asignar Precio</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px; max-width: 500px; margin: auto;">

    <h1>Cotizar Trabajo #{{ cotizacion.id }}</h1>
    <p>Estilo: {{ cotizacion.estilo }} | Zona: {{ cotizacion.zona_cuerpo }}</p>

    <form method="POST" style="display: flex; flex-direction: column; gap: 15px;">
        {% csrf_token %}
        
        <div>
            <label><strong>Precio Total Estimado ($):</strong></label><br>
            <input type="number" step="0.01" name="monto_total" required style="width: 100%; padding: 8px;">
        </div>

        <div>
            <label><strong>Anticipo Requerido para Agendar ($):</strong></label><br>
            <input type="number" step="0.01" name="monto_anticipo" required style="width: 100%; padding: 8px;">
        </div>
        
        <button type="submit" style="padding: 10px; background-color: #28a745; color: white; border: none; cursor: pointer;">
            Aceptar y Enviar Cotización
        </button>
    </form>

</body>
</html>
