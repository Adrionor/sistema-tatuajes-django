<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Solicitar Cotización</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/material_blue.css">
</head>
<body style="font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto;">

    <h1>Cotiza tu próximo tatuaje</h1>
    <p>Llena tus datos. Al elegir a tu tatuador, el calendario te mostrará sus fechas disponibles.</p>

    <form method="POST" enctype="multipart/form-data" style="display: flex; flex-direction: column; gap: 15px;">
        {% csrf_token %}
        
        {{ form.as_p }}
        
        <button type="submit" style="padding: 10px; background-color: #28a745; color: white; border: none; cursor: pointer;">
            Enviar Solicitud
        </button>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Seleccionamos los campos de nuestro formulario
            const selectTatuador = document.querySelector('select[name="tatuador"]');
            const inputFecha = document.querySelector('input[name="fecha_solicitada"]');
            
            // Inicializamos el calendario vacío
            let calendario = flatpickr(inputFecha, {
                enableTime: true,
                dateFormat: "Y-m-d H:i",
                minDate: "today", // No pueden agendar en el pasado
                locale: "es",
                disable: [] // Aquí meteremos las fechas ocupadas
            });

            // Escuchamos cuando el cliente elige a un tatuador diferente
            selectTatuador.addEventListener('change', function() {
                const tatuadorId = this.value;
                
                if (tatuadorId) {
                    // Llamamos a nuestra API en Django
                    fetch(`/citas/api/fechas-ocupadas/${tatuadorId}/`)
                        .then(response => response.json())
                        .then(fechasOcupadas => {
                            // Actualizamos el calendario para bloquear esas fechas
                            calendario.set('disable', fechasOcupadas);
                            inputFecha.placeholder = "Selecciona una fecha disponible";
                        })
                        .catch(error => console.error('Error fetching dates:', error));
                } else {
                    // Si no ha elegido tatuador, limpiamos los bloqueos
                    calendario.set('disable', []);
                }
            });
        });
    </script>
</body>
</html>
