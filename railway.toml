[build]
builder = "nixpacks"

[deploy]
releaseCommand = "cd sistema_tatuajes && python manage.py migrate --no-input && python manage.py collectstatic --no-input"
startCommand = "sh -c 'cd sistema_tatuajes && python manage.py migrate --no-input && python manage.py collectstatic --no-input && exec gunicorn core.wsgi:application --bind 0.0.0.0:${PORT} --workers 2 --timeout 90'"
healthcheckPath = "/health/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
